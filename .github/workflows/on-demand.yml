name: On-demand E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Suite to run
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - regression

jobs:
  e2e-on-demand:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      APP_USERNAME: ${{ secrets.APP_USERNAME }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      CI_PROJECTS: chromium
      CI_RETRIES: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run selected suite
        id: run_suite
        continue-on-error: true
        run: |
          case "${{ inputs.suite }}" in
            smoke)
              npm run test:smoke -- --project=chromium --retries=0
              ;;
            regression)
              npm run test:regression -- --project=chromium --retries=0
              ;;
            *)
              npm run test:ci:chromium -- --project=chromium --retries=0
              ;;
          esac

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Analyze failures
        if: always()
        id: analyze
        continue-on-error: true
        run: npm run analyze

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: on-demand-e2e-${{ github.run_number }}
          path: |
            allure-report/
            allure-results/
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Finalize result
        if: always()
        run: |
          if [ "${{ steps.run_suite.outcome }}" != "success" ]; then
            echo "Selected suite failed. See uploaded artifacts." >&2
            exit 1
          fi
          if [ "${{ steps.analyze.outcome }}" != "success" ]; then
            echo "Failure analyzer detected failures." >&2
            exit 1
          fi
